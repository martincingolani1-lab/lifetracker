<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="ring-mask">
      <!-- White area = visible, black area = transparent -->
      <rect width="100" height="100" fill="white"/>
      <!-- Cut out the middle ring -->
      <circle cx="50" cy="50" r="28" fill="black"/>
    </mask>
  </defs>
  
  <!-- Outer ring with mask applied -->
  <circle cx="50" cy="50" r="45" fill="#FACC15" mask="url(#ring-mask)"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="12" fill="#FACC15"/>
</svg>
